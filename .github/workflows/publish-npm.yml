name: Publish Pi extension to npm

on:
  release:
    types: [published]
  workflow_dispatch:        # manual dry-run path
  pull_request:             # build-check only (no publish)
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: integrations/pi
        run: bun install
      - name: Type-check
        working-directory: integrations/pi
        run: bunx tsc --noEmit
      - name: Test
        working-directory: integrations/pi
        run: bun test
      - name: Pack check
        working-directory: integrations/pi
        run: npm pack --dry-run

  publish-npm:
    needs: build-check
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write          # OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # guard needs origin/main history for the ancestry check
      - name: Guard — tag ref + on-main ancestry
        run: |
          if ! [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::refusing to publish: $GITHUB_REF is not a clean version tag (^refs/tags/v[0-9]+.[0-9]+.[0-9]+$)"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::refusing to publish: $GITHUB_SHA is not an ancestor of origin/main"
            exit 1
          fi
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: integrations/pi
        run: bun install
      - name: Verify release tag matches package versions (Arm B)
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release tag version: $VERSION"
          PKG_VERSION=$(node -p "require('./integrations/pi/package.json').version")
          SERVER_VERSION=$(node -p "require('./server.json').version")
          SERVER_PKG_VERSION=$(node -p "require('./server.json').packages[0].version")
          echo "package.json: $PKG_VERSION"
          echo "server.json .version: $SERVER_VERSION"
          echo "server.json .packages[0].version: $SERVER_PKG_VERSION"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != release tag ($VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$SERVER_VERSION" ]; then
            echo "::error::server.json .version ($SERVER_VERSION) != release tag ($VERSION)"
            exit 1
          fi
          if [ "$VERSION" != "$SERVER_PKG_VERSION" ]; then
            echo "::error::server.json .packages[0].version ($SERVER_PKG_VERSION) != release tag ($VERSION)"
            exit 1
          fi
      - name: Detect NPM_TOKEN (skip the npm publish if absent — Pi deferred)
        id: npmtok
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::notice::NPM_TOKEN not set — skipping the npm publish (Pi extension deferred until the token is configured). PyPI is unaffected; re-run this job once NPM_TOKEN exists."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upgrade npm (>= 11.5.1 for OIDC trusted publishing)
        if: steps.npmtok.outputs.publish == 'true'
        run: npm install -g npm@latest
      - name: Publish to npm
        if: steps.npmtok.outputs.publish == 'true'
        working-directory: integrations/pi
        # INAUGURAL publish of a NEW scoped package: npm has NO "pending publishers"
        # (unlike PyPI), so a trusted publisher can't be configured until the package
        # exists. Bootstrap with a token (NODE_AUTH_TOKEN ← the NPM_TOKEN secret;
        # setup-node's registry-url wires it into .npmrc). --provenance still attaches a
        # build attestation via the id-token: write permission above. Once the package
        # exists, configure Trusted Publishing on npmjs.com and revert to OIDC-only
        # (drop this env + the NPM_TOKEN secret).
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  dry-run:
    needs: build-check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: integrations/pi
        run: bun install
      - name: Type-check
        working-directory: integrations/pi
        run: bunx tsc --noEmit
      - name: Test
        working-directory: integrations/pi
        run: bun test
      - name: Pack check
        working-directory: integrations/pi
        run: npm pack --dry-run
      - name: Publish dry-run
        working-directory: integrations/pi
        run: npm publish --dry-run --access public
